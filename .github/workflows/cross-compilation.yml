name: Cross-Compilation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  cross-compile-test:
    name: Cross-compile to ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: native
            dev-shell: cross-native

          - target: arm32
            dev-shell: cross-arm32

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-24.11
        extra_nix_config: |
          experimental-features = nix-command flakes
          max-jobs = auto
          cores = 4
          keep-outputs = true
          keep-derivations = true

    - name: Setup Cachix
      uses: cachix/cachix-action@v15
      with:
        name: hs-bindgen
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        extraPullNames: nix-community

    - name: Get cache key
      id: cache-key
      run: |
        echo "key=nix-cross-${{ matrix.target }}-$(sha256sum examples/cross-compilation/flake.lock | cut -d' ' -f1)" >> $GITHUB_OUTPUT

    - name: Restore Nix store paths
      uses: actions/cache/restore@v4
      id: cache-restore
      with:
        path: |
          /nix/store
          /nix/var/nix/db
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: |
          nix-cross-${{ matrix.target }}-

    - name: Build and cache dev shell
      if: steps.cache-restore.outputs.cache-hit != 'true'
      working-directory: examples/cross-compilation
      run: |
        set -x
        echo "==> Building dev shell for ${{ matrix.target }}..."
        echo "==> First run will be slow; subsequent runs use the cache."
        time nix build .#devShells.x86_64-linux.${{ matrix.dev-shell }} --print-build-logs
        echo "==> Dev shell built successfully"

    - name: Save Nix store paths
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          /nix/store
          /nix/var/nix/db
        key: ${{ steps.cache-key.outputs.key }}

    - name: Update Hackage index
      run: |
        nix develop ./examples/cross-compilation#${{ matrix.dev-shell }} --command cabal update

    - name: Run workflow with timing
      working-directory: examples/cross-compilation
      run: |
        set -x
        echo "==> Starting cross-compilation for ${{ matrix.target }}"
        time nix develop .#${{ matrix.dev-shell }} --command ./generate-and-run.sh ${{ matrix.target }}

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.target }}
        path: |
          examples/cross-compilation/hs-project/dist-newstyle*/
          examples/cross-compilation/hs-project/**/*.log
        retention-days: 7
        if-no-files-found: ignore
