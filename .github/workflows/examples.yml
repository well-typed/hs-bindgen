name: Examples

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

concurrency:
  # We do not want nightly runs to cancel non-nightly runs and vice versa, so
  # for nightly runs the name of the concurreny group includes a "nightly" infix
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'nightly-' || '' }}${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # Run a comprehensive set of examples nightly on the default branch.
  nightly: ${{ github.event_name == 'schedule' }}
  # A number of default examples are run on PRs, in the merge queue, and on
  # pushes to main. A more comprehensive suite of examples is run nightly or
  # when dispatched manually.
  comprehensive: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}

jobs:
  setup-matrix:
    name: "Examples: Setup matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}

    defaults:
      run:
        shell: bash

    env:
      # A number of default examples are run on PRs, in the merge queue, and on
      # pushes to main. A more comprehensive suite of examples is run nightly or
      # when dispatched manually.
      comprehensive: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}

    steps:

    # NOTE: For caching purposes, the matrix combinations that we test on pull
    # requests should be a subset of the matrix combinations we run on the
    # merge queue and the default branch.
    - name: 🛠️ Setup matrix
      # Note: env.comprehensive is a stringized boolean, so we have to check
      # string equality
      if: ${{ env.comprehensive == 'false' }}
      run: |
        { echo 'MATRIX_COMBINATIONS<<EOF'
          # default (ordered alphabetically)
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "blocktest"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "bundled-c"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "constructor-import-issue"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "feature-tests"},'
          # feature-tests is also exercised on macOS and Windows (#1912).
          # macOS uses LLVM 14, matching the haskell.yml convention.
          # Windows uses the LLVM bundled with GHC, so llvm-version is unused
          # on that runner (but kept in the matrix for cache-key uniqueness).
          echo '{"runner": "macos-latest"  , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "14"     , "example": "feature-tests"},'
          echo '{"runner": "windows-latest", "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "bundled", "example": "feature-tests"},'
          echo EOF
        } >> "$GITHUB_ENV"

    - name: 🛠️ Setup matrix (Comprehensive)
      # Note: env.comprehensive is a stringized boolean, so we have to check
      # string equality
      if: ${{ env.comprehensive == 'true' }}
      run: |
        { echo 'MATRIX_COMBINATIONS<<EOF'
          # first the default tests, same as above (ordered alphabetically)
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "blocktest"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "bundled-c"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "constructor-import-issue"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "feature-tests"},'
          # feature-tests is also exercised on macOS and Windows (#1912).
          # macOS uses LLVM 14, matching the haskell.yml convention.
          # Windows uses the LLVM bundled with GHC, so llvm-version is unused
          # on that runner (but kept in the matrix for cache-key uniqueness).
          echo '{"runner": "macos-latest"  , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "14"     , "example": "feature-tests"},'
          echo '{"runner": "windows-latest", "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "bundled", "example": "feature-tests"},'
          # then the remaining ones, which we only run for the comprehensive check (ordered alphabetically)
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "botan"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "c-minisat"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "c-qrcode"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "c-rogueutil"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "c-rpm"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "c-yaml"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "cef"},'
          echo '{"runner": "ubuntu-latest" , "ghc-version": "9.4", "cabal-version": "3.16", "llvm-version": "15", "example": "libpcap"},'
          echo EOF
        } >> "$GITHUB_ENV"

    - name: 🛠️ Setup matrix
      id: setup-matrix
      run: |
        echo $MATRIX_COMBINATIONS
        MATRIX="{\"include\":[$MATRIX_COMBINATIONS]}"
        echo $MATRIX
        {
          echo 'MATRIX<<EOF'
          echo "$MATRIX"
          echo EOF
        } >> "$GITHUB_OUTPUT"

  check-success:
    name: "Examples: Check success"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    needs:
    - build-and-test-example

    defaults:
      run:
        shell: bash

    if: ${{ !cancelled() }}

    steps:
    - name: 🧪 Report failure
      if: ${{ needs.build-and-test-example.result == 'failure' }}
      run: |
        echo "Some jobs failed"
        exit 1

    - name: 🧪 Report success
      if: ${{ needs.build-and-test-example.result == 'success'  }}
      run: |
        echo "All jobs succeeded"
        exit 0

    # Post a comment on an issue to notify developers of failures
    #
    # This step is based on:
    # <https://docs.github.com/en/actions/tutorials/manage-your-work/add-comments-with-labels>
    - name: 🧪 Notifications for failure (Nightly)
      # NOTE: env.nightly is a stringized boolean, so we perform string
      # equality rather than boolean equality
      if: ${{ failure() && env.nightly == 'true' }}
      id: notifications
      run: gh issue comment "$NUMBER" --body "$BODY"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: 1977
        BODY: >
          Nightly CI for the Examples workflow failed.
          See the results at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.

  build-and-test-example:
    name: "Examples: Build and test ${{ matrix.example }} example (${{ matrix.runner }}, GHC ${{ matrix.ghc-version }}, Cabal ${{ matrix.cabal-version }}, LLVM ${{matrix.llvm-version }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    needs:
    - setup-matrix

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    env:
      # We assume that the example executable lives in this directory
      hs-project-directory: './examples/${{matrix.example}}/hs-project'
      # Increment this number to reset caches.
      #
      # Caches of the cabal store generally grow in size: new packages are
      # added, but never removed. Unless we start with a fresh cabal store once
      # in a while. The cache-reset-number is part of the cache key, and if it
      # is incremented, then the "Restor cache" step fails to restore a cache,
      # meaning we will start with an empty cabal store that we will then save a
      # new cache for.
      cache-reset-number: 0

    steps:
    - name: 🛠️ Set git to use LF
      # Required for the Windows runner: prevents autocrlf from rewriting
      # shell scripts and breaking them.  Harmless on Linux/macOS.
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: 🛠️ Fix git on macOS (prioritize system git over Homebrew)
      if: ${{ runner.os == 'macOS' }}
      run: echo "/usr/bin" >> "$GITHUB_PATH"

    - name: 📥 Checkout repository
      uses: actions/checkout@v7

    - name: 🛠️ Setup Haskell
      id: setup-haskell
      uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ matrix.ghc-version }}
        cabal-version: ${{ matrix.cabal-version }}

    - name: 🛠️ Setup LLVM/Clang
      if: ${{ runner.os != 'Windows' }}
      uses: ./.github/actions/setup-llvm
      with:
        version: ${{ matrix.llvm-version }}

    - name: 🛠️ Setup LLVM/Clang (Windows)
      # On Windows we use the Clang bundled with GHC instead of a separate
      # LLVM install (matching `.github/workflows/windows.yml`).
      if: ${{ runner.os == 'Windows' }}
      uses: ./.github/actions/setup-llvm-windows
      with:
        ghc-version: ${{ steps.setup-haskell.outputs.ghc-version }}

    - name: 🛠️ Install doxygen
      uses: ./.github/actions/setup-doxygen

    # The hs-bindgen-cli executable and the example executable are built using
    # different environments. The former using the top-level project file, the
    # latter using its own local project file. For this reason, we generate two
    # build plans that we later combine in the cache-cabal-restore step.
    #
    # NOTE: the use of "cabal build all" is intentional.

    - name: 🛠️ Configure (hs-bindgen-cli)
      run: |
        cabal configure --disable-test --disable-benchmark --disable-documentation --ghc-options="-Werror"
        cat "cabal.project.local"

    - name: 🛠️ Configure (${{ matrix.example }})
      working-directory: ${{ env.hs-project-directory }}
      run: |
        cabal configure --enable-test --disable-benchmark --disable-documentation --ghc-options="-Werror"
        cat "cabal.project.local"

    - name: 💾 Generate Cabal plan (hs-bindgen-cli)
      run: |
        cabal build all --dry-run

    - name: 💾 Generate Cabal plan (${{ matrix.example }})
      working-directory: ${{ env.hs-project-directory }}
      run: |
        cabal build all --dry-run

    # Here is where we hash the two build plan files together and include the
    # hash in the cache key. If either build plan changes, then the hash
    # changes, and we'll save a new cache.
    - name: 💾 Restore Cabal dependencies
      id: cache-cabal-restore
      uses: actions/cache/restore@v6
      env:
        key: build-example-${{ matrix.example }}-${{ env.cache-reset-number }}-${{ matrix.runner }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ steps.setup-haskell.outputs.cabal-version }}-llvm-${{ matrix.llvm-version }}
        plan-file-hs-bindgen-cli: './dist-newstyle/cache/plan.json'
        plan-file-example: '${{env.hs-project-directory}}/dist-newstyle/cache/plan.json'
      with:
        path: ${{ steps.setup-haskell.outputs.cabal-store }}
        key: ${{ env.key }}-plan-${{ hashFiles(env.plan-file-hs-bindgen-cli, env.plan-file-example) }}
        restore-keys: ${{ env.key }}-

    # The hs-bindgen-cli executable and the example executable are built using
    # different environments, so we build their dependencies separately. They
    # will be stored in the same Cabal store.
    #
    # NOTE: the use of "cabal build all" is intentional.

    - name: 🛠️ Build Cabal dependencies (hs-bindgen-cli)
      run: |
        cabal build all --only-dependencies

    - name: 🛠️ Build Cabal dependencies (${{ matrix.example }})
      working-directory: ${{ env.hs-project-directory }}
      run: |
        cabal build all --only-dependencies

    # Only save a new cache if it does not exist yet
    - name: 💾 Save Cabal dependencies
      uses: actions/cache/save@v6
      if: ${{ steps.cache-cabal-restore.outputs.cache-hit != 'true' }}
      with:
        path: ${{ steps.setup-haskell.outputs.cabal-store }}
        key: ${{ steps.cache-cabal-restore.outputs.cache-primary-key }}

    - name: 🏗️ Build (hs-bindgen-cli)
      run: |
        cabal build hs-bindgen-cli

    - name: 🧪 Debug (hs-bindgen-cli)
      run: |
        echo '### Version'
        cabal run hs-bindgen-cli -- --version
        echo '### libclang -v'
        cabal run hs-bindgen-cli -- info libclang --clang-option=-v
        echo '### Resolve (clang)'
        cabal run hs-bindgen-cli -- info resolve-header -v4 --builtin-include-dir=clang stdint.h

    - name: 🧪 Build and run blocktest example
      if: ${{ matrix.example == 'blocktest' }}
      uses: ./.github/actions/examples/blocktest

    - name: 🧪 Build and run botan example
      if: ${{ matrix.example == 'botan' }}
      uses: ./.github/actions/examples/botan

    - name: 🧪 Build and run bundled-c example
      if: ${{ matrix.example == 'bundled-c' }}
      uses: ./.github/actions/examples/bundled-c

    - name: 🧪 Build and run c-minisat example
      if: ${{ matrix.example == 'c-minisat' }}
      uses: ./.github/actions/examples/c-minisat

    - name: 🧪 Build and run c-qrcode example
      if: ${{ matrix.example == 'c-qrcode' }}
      uses: ./.github/actions/examples/c-qrcode

    - name: 🧪 Build and run c-rogueutil example
      if: ${{ matrix.example == 'c-rogueutil' }}
      uses: ./.github/actions/examples/c-rogueutil

    - name: 🧪 Build and run c-rpm example
      if: ${{ matrix.example == 'c-rpm' }}
      uses: ./.github/actions/examples/c-rpm

    - name: 🧪 Build and run c-yaml example
      if: ${{ matrix.example == 'c-yaml' }}
      uses: ./.github/actions/examples/c-yaml

    - name: 🧪 Build and run cef example
      if: ${{ matrix.example == 'cef' }}
      uses: ./.github/actions/examples/cef

    - name: 🧪 Build and run constructor-import-issue example
      if: ${{ matrix.example == 'constructor-import-issue' }}
      uses: ./.github/actions/examples/constructor-import-issue

    - name: 🧪 Build and run feature-tests example
      if: ${{ matrix.example == 'feature-tests' }}
      uses: ./.github/actions/examples/feature-tests

    - name: 🧪 Build and run libpcap example
      if: ${{ matrix.example == 'libpcap' }}
      uses: ./.github/actions/examples/libpcap
