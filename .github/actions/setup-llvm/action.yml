name: Setup LLVM
description: Install LLVM/Clang for the host platform

inputs:
  version:
    description: 'LLVM version'
    required: true

runs:
  using: composite
  steps:
  # Linux: install from apt. Ubuntu noble ships clang/llvm 14-19 in its own repos;
  # newer versions come from apt.llvm.org (its noble repo covers >= 17, used here
  # for >= 20). Both sources install to /usr/lib/llvm-N with an unversioned bin/
  # (clang, llvm-config), so the environment setup is uniform.
  - name: Install LLVM/Clang (Linux)
    shell: bash
    if: ${{ runner.os == 'Linux' }}
    run: |
      version="${{ inputs.version }}"
      if [ "$version" -le 19 ]; then
        sudo apt-get update
        sudo apt-get install -y \
          "clang-$version" "libclang-$version-dev" "llvm-$version-dev"
      else
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh "$version" all
      fi
      echo "LLVM_PATH=/usr/lib/llvm-$version" | tee -a "$GITHUB_ENV"
      echo "/usr/lib/llvm-$version/bin"        | tee -a "$GITHUB_PATH"

  # macOS: install from the official LLVM release tarballs (arm64). The asset
  # naming differs per release, so the URLs are pinned per version; --strip-
  # components=1 normalises the differing top-level directory names into $dest.
  - name: Install LLVM/Clang (macOS)
    shell: bash
    if: ${{ runner.os == 'macOS' }}
    run: |
      version="${{ inputs.version }}"
      base="https://github.com/llvm/llvm-project/releases/download"
      case "$version" in
        14) url="$base/llvmorg-14.0.6/clang+llvm-14.0.6-arm64-apple-darwin22.3.0.tar.xz" ;;
        16) url="$base/llvmorg-16.0.5/clang+llvm-16.0.5-arm64-apple-darwin22.0.tar.xz" ;;
        18) url="$base/llvmorg-18.1.8/clang+llvm-18.1.8-arm64-apple-macos11.tar.xz" ;;
        20) url="$base/llvmorg-20.1.8/LLVM-20.1.8-macOS-ARM64.tar.xz" ;;
        22) url="$base/llvmorg-22.1.8/LLVM-22.1.8-macOS-ARM64.tar.xz" ;;
        *)  echo "::error::No pinned macOS LLVM tarball for version $version; add its URL" ; exit 1 ;;
      esac
      dest="$RUNNER_TEMP/llvm"
      mkdir -p "$dest"
      curl -fL "$url" | tar -xJ --strip-components=1 -C "$dest"
      # The official macOS tarball ships libclang.dylib with install name
      # @rpath/libclang.dylib. A configure conftest (libclang-bindings) links
      # it without an rpath, so dyld cannot resolve @rpath at runtime. Rewrite
      # the install name to an absolute path so anything linking libclang finds
      # it with no rpath/DYLD_LIBRARY_PATH needed.
      install_name_tool -id "$dest/lib/libclang.dylib" "$dest/lib/libclang.dylib"
      echo "LLVM_PATH=$dest"                   | tee -a "$GITHUB_ENV"
      echo "LLVM_CONFIG=$dest/bin/llvm-config" | tee -a "$GITHUB_ENV"
      echo "LIBCLANG_PATH=$dest/lib"           | tee -a "$GITHUB_ENV"
      echo "$dest/bin"                         | tee -a "$GITHUB_PATH"
      # hs-bindgen automatically sets SDKROOT, but we still need it to build
      # shared libraries with Clang.
      echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" | tee -a "$GITHUB_ENV"

  - name: Debug (LLVM/Clang)
    shell: bash
    run: |
      echo '### which clang'
      which clang
      echo '### clang --version'
      clang --version
      echo '### $LLVM_PATH'
      echo "$LLVM_PATH"
      echo '### ls $LLVM_PATH'
      ls "$LLVM_PATH"
      echo '### ls $LLVM_PATH/bin'
      ls "$LLVM_PATH/bin"
