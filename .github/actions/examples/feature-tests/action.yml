name: feature-tests example
description: Build and run the feature-tests example

runs:
  using: composite
  steps:
    - name: Run generation and build script (Clang)
      shell: bash
      working-directory: ./examples/feature-tests
      run: ./generate-and-run.sh
    # On Windows we only have the Clang bundled with GHC and no `gcc` on PATH,
    # so skip the GCC pass there.  Linux and macOS runners both ship GCC.
    - name: Run generation and build script (GCC)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ./examples/feature-tests
      env:
        CC: gcc
      run: ./generate-and-run.sh
