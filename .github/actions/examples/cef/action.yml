name: cef example
description: Build and run the cef example

runs:
  using: composite
  steps:
    - name: Install CEF runtime dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libglib2.0-0 libnspr4 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
          libcups2 libx11-6 libxcomposite1 libxdamage1 libxext6 \
          libxfixes3 libxrandr2 libgbm1 libexpat1 libxcb1 \
          libxkbcommon0 libcairo2 libpango-1.0-0 libasound2t64 \
          libatspi2.0-0 libdbus-1-3

    - name: 💾 Cache CEF binary distribution
      id: cache-cef
      uses: actions/cache@v4
      with:
        path: ./examples/cef/cef_binary_*
        key: cef-binary-145.0.28-chromium-145.0.7632.160

    - name: Run generation and build script
      shell: bash
      working-directory: ./examples/cef
      run: ./generate-and-run.sh
